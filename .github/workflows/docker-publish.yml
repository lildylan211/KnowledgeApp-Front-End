name: Build & Publish Frontend Image

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .   # repo root
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build React app (inject API URL)
        env:
          VITE_API_URL: https://knowledgeapp-back.onrender.com/api   # <-- will be the final URL
        run: npm run build

      - name: Docker login
        run: echo ${{ secrets.DOCKERHUB_TOKEN }} |
             docker login -u ${{ secrets.DOCKERHUB_USER }} --password-stdin

      - name: Build & push Docker image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USER }}/knowledgeapp-front:${{ github.sha }}
          docker build -t $IMAGE \
            --build-arg VITE_API_URL=https://knowledgeapp-back.onrender.com/api \
            .
          docker push $IMAGE
